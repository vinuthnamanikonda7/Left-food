<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeftOverGo</title>
<link rel="stylesheet" href="style.css">
</head>
<body><!-- LOGIN PAGE --><div id="loginPage" class="center">
  <div class="card">
    <h2>LEFTOVER<span>GO</span></h2>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number"><div class="roles">
  <button onclick="selectRole(this,'donor')" class="active">Donor</button>
  <button onclick="selectRole(this,'receiver')">Receiver</button>
  <button onclick="selectRole(this,'delivery')">Delivery</button>
</div>

<button onclick="sendOTP()">Get OTP</button>

  </div>
</div><!-- OTP POPUP --><div id="otpBox" class="overlay">
  <div class="popup">
    <h3>Verify OTP</h3>
    <div class="otp-inputs">
      <input maxlength="1"><input maxlength="1"><input maxlength="1"><input maxlength="1">
    </div>
    <button onclick="verifyOTP()">Verify & Login</button>
  </div>
</div><!-- MAIN APP --><div id="app" style="display:none;">
  <nav>
    <div class="logo">LEFTOVER<span>GO</span></div>
    <div class="menu">
      <a onclick="showPage('home')">Home</a>
      <a onclick="showPage('about')">About</a>
      <a onclick="showPage('impact')">Impact</a>
      <a onclick="showPage('contact')">Contact</a>
    </div>
    <div>
      <span id="user"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>  <!-- HOME -->  <div id="home" class="page active">
    <h2 id="welcome"></h2><!-- DONOR -->
<div id="donorView">
  <div class="card add" onclick="openModal()">+ Post Surplus</div>
  <div id="donorList" class="grid"></div>
</div>

<!-- RECEIVER -->
<div id="receiverView" class="grid"></div>

<!-- DELIVERY -->
<div id="deliveryView" class="grid"></div>

  </div>  <div id="about" class="page">About Us Page</div>
  <div id="impact" class="page">Impact Page</div>
  <div id="contact" class="page">Contact Page</div>
</div><!-- ADD FOOD MODAL --><div id="modal" class="overlay">
  <div class="popup">
    <h3>Post Surplus</h3>
    <input id="food" placeholder="Food Title">
    <input id="qty" placeholder="Quantity">
    <input id="time" type="time">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="addr" placeholder="Address">
    <button onclick="addFood()">Add Item</button>
  </div>
</div><script src="script.js"></script></body>
